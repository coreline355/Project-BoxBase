name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material

      - run: mkdocs build

      - run: cp google67c6a94ae3346584.html site/google67c6a94ae3346584.html

      - run: mkdocs gh-deploy --force
